name: build

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created, published]

jobs:
  build:
    name: build (${{ matrix.os_name }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_name: linux
            arch: aarch64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os_name: darwin
            arch: x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            os_name: darwin
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            printer
            computer
            codegraph

      - name: Build all CLIs
        run: make build

      - name: Test all CLIs
        run: make test

      # Stage bare binaries and package them the way install.sh expects:
      #   tarball   printer-${OS}-${ARCH}.tar.gz   (version lives in the path, not the name)
      #   checksum  <tarball>.sha256                (sha256 of the tarball itself)
      - name: Stage release artifacts
        run: |
          mkdir -p dist
          for c in printer computer codegraph; do
            install -m 0755 "$c/target/release/$c" "dist/$c"
          done
          TARBALL="printer-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz"
          ( cd dist && tar czf "$TARBALL" printer computer codegraph )
          ( cd dist && shasum -a 256 "$TARBALL" > "$TARBALL.sha256" )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/printer-*.tar.gz*
          if-no-files-found: error

      # On release, attach the per-platform tarball + its .sha256 to the GitHub
      # release. Point install.sh at the release with, e.g.:
      #   PRINTER_BASE_URL=https://github.com/<owner>/<repo>/releases/download \
      #     PRINTER_VERSION=<tag>  (see install.sh comments)
      - name: Attach binaries to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          TARBALL="printer-${{ matrix.os_name }}-${{ matrix.arch }}.tar.gz"
          gh release upload "$TAG" \
            "dist/$TARBALL" \
            "dist/$TARBALL.sha256" \
            --clobber
